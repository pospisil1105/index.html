<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST PROTOCOL</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff41; padding: 20px; text-align: center; }
        .box { border: 1px dashed #00ff41; padding: 15px; background: #000; margin: 20px auto; max-width: 400px; min-height: 100px; text-align: left; }
        .btn { background: #00ff41; color: #000; padding: 20px; border: none; width: 100%; max-width: 400px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #log { font-size: 0.7em; color: #888; margin-top: 20px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <h1 id="title">GHOST PROTOCOL</h1>
    <p id="subtitle">Digitální stín:</p>
    
    <div class="box" id="data">Hledám signál...</div>

    <button class="btn" id="main-btn" onclick="toggleGhost()">AKTIVOVAT OCHRANU</button>

    <div id="log"></div>

    <script>
        const translations = {
            cs: { title: "GHOST PROTOCOL", btn: "Aktivovat šum", stop: "Zastavit", battery: "Baterie", res: "Displej" },
            en: { title: "GHOST PROTOCOL", btn: "Activate Noise", stop: "Stop", battery: "Battery", res: "Display" }
        };

        const lang = navigator.language.startsWith('cs') ? 'cs' : 'en';
        const t = translations[lang];

        document.getElementById('title').innerText = t.title;
        document.getElementById('main-btn').innerText = t.btn;

        function updateData() {
            const dataDiv = document.getElementById('data');
            const basicInfo = 🖥️ ${t.res}: ${window.screen.width}x${window.screen.height}<br>🧠 Cores: ${navigator.hardwareConcurrency || '🔒'};
            
            // Pokus o baterii s pojistkou
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    dataDiv.innerHTML =🔋 ${t.battery}: ${Math.round(b.level * 100)}%<br>` + basicInfo;
                }).catch(() => {
                    dataDiv.innerHTML =🔋 ${t.battery}: 🔒<br>` + basicInfo;
                });
            } else {
                dataDiv.innerHTML =🔋 ${t.battery}: 🔒<br>` + basicInfo;
            }
        }

        let active = false;
        function toggleGhost() {
            const log = document.getElementById('log');
            active = !active;
            document.getElementById('main-btn').innerText = active ? t.stop : t.btn;
            
            if(active) {
                log.innerHTML = ">>> MASKING STARTED...<br>" + log.innerHTML;
            } else {
                log.innerHTML = ">>> PAUSED.<br>" + log.innerHTML;
            }
        }

        // Spustit hned
        updateData();
    </script>
</body>
</html>
