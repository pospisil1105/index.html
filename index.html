<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST PROTOCOL | Absolute Decoy</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; padding: 20px; text-align: center; overflow-x: hidden; }
        .box { border: 1px solid #00ff41; padding: 15px; background: #000; margin: 10px auto; max-width: 450px; text-align: left; }
        .btn { background: #00ff41; color: #000; padding: 15px; border: none; width: 100%; max-width: 450px; font-weight: bold; cursor: pointer; margin-bottom: 10px; text-transform: uppercase; transition: 0.2s; }
        .panic-btn { background: #ff0000; color: #fff; font-size: 1.2em; box-shadow: 0 0 25px #ff0000; display: none; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #network-monitor { font-size: 0.65em; color: #ff3e3e; margin: 15px auto; max-width: 450px; height: 150px; overflow: hidden; border: 1px solid #330000; background: #0a0000; padding: 8px; line-height: 1.2; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; max-width: 450px; margin: 0 auto; font-size: 0.8em; color: #888; }
        .warning { color: #ff3e3e; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 2px;">GHOST PROTOCOL v4.5</h1>
    
    <div class="box" id="device-info">
        [ SYSTÉMOVÁ ANALÝZA ]<br>
        IP: <span id="ip-display" style="color:#00d9ff">Scanning...</span><br>
        Fingerprint: <span id="fp-status" style="color:#ff3e3e">ČITELNÝ</span>
    </div>

    <button class="btn" id="start-btn" onclick="startShield()">AKTIVOVAT CLONU</button>
    <button class="btn panic-btn" id="panic-btn" onclick="triggerPanic()">!!! PANIC MODE !!!</button>
    
    <div id="network-monitor">>>> ČEKÁM NA PŘÍKAZ...</div>

    <div class="stat-grid">
        <div>ZÁSAHY: <span id="hits" style="color:#fff">0</span></div>
        <div>FALEŠNÉ KLIKY: <span id="clicks" style="color:#fff">0</span></div>
    </div>

    <script>
        let isPanic = false;
        let hits = 0;
        let clicks = 0;
        const keywords = ["investing", "bioweapon-defense", "offshore-banking", "encryption-keys", "anonymous-browsing", "surveillance-bypass"];

        async function fetchIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                document.getElementById('ip-display').innerText = data.ip;
            } catch(e) { document.getElementById('ip-display').innerText = "VPN ACTIVE / HIDDEN"; }
        }

        function startShield() {
            document.getElementById('start-btn').style.display = "none";
            document.getElementById('panic-btn').style.display = "block";
            document.getElementById('fp-status').innerText = "ZAHALEN (ŠUM)";
            document.getElementById('fp-status').style.color = "#00ff41";
            
            setInterval(() => injectNoise("DECOY"), 1200);
        }

        function triggerPanic() {
            isPanic = true;
            const monitor = document.getElementById('network-monitor');
            monitor.innerHTML = "<span class='warning'>!!! EXTRÉMNÍ SEKVENCE SPUŠTĚNA !!!</span><br>" + monitor.innerHTML;
            
            // Masivní smršť dat i falešných kliknutí
            const panicLoop = setInterval(() => {
                injectNoise("PANIC");
                generateGhostClick();
                if(!isPanic) clearInterval(panicLoop);
            }, 60);

            setTimeout(() => {
                isPanic = false;
                monitor.innerHTML = "<span style='color:#00ff41'>--- SEKVENCE DOKONČENA: DATA OTRÁVENA ---</span><br>" + monitor.innerHTML;
            }, 6000); 
        }

        function injectNoise(type) {
            const kw = keywords[Math.floor(Math.random() * keywords.length)];
            const monitor = document.getElementById('network-monitor');
            
            fetch(`https://source.unsplash.com/20x20/?${kw}&${Math.random()}`, { mode: 'no-cors' });
            
            hits++;
            document.getElementById('hits').innerText = hits;
            const time = new Date().toLocaleTimeString();
            monitor.innerHTML = `[${time}] ${type}: Requesting metadata [${kw}]...<br>` + monitor.innerHTML;
        }

        function generateGhostClick() {
            const x = Math.floor(Math.random() * window.innerWidth);
            const y = Math.floor(Math.random() * window.innerHeight);
            
            // Vytvoření falešné události pro trackery
            const ghostEvent = new MouseEvent('click', {
                'view': window,
                'bubbles': true,
                'clientX': x,
                'clientY': y
            });
            document.dispatchEvent(ghostEvent);

            clicks++;
            document.getElementById('clicks').innerText = clicks;
            const monitor = document.getElementById('network-monitor');
            monitor.innerHTML = `<span style="color:#ffaa00">[GHOST] Fake interaction at [X:${x} Y:${y}]</span><br>` + monitor.innerHTML;
        }

        fetchIP();
    </script>
</body>
</html>
